<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" role="img" aria-label="Futurely">
  <title>Futurely</title>
  <defs>
    <linearGradient id="g" x1="0" y1="5" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="45%"  stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>
  <!-- Mortarboard diamond -->
  <path d="M6 11 L22 5 L38 11 L22 17 Z" fill="url(#g)"/>
  <!-- Bevel highlight on top edge -->
  <path d="M6 11 L22 5 L38 11" stroke="white" stroke-width="0.8" stroke-linejoin="round" fill="none" opacity="0.35"/>
  <!-- Tassel -->
  <line x1="37" y1="10" x2="40" y2="19" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <circle cx="40" cy="20.5" r="1.5" fill="white" opacity="0.7"/>
  <!-- Crown -->
  <rect x="16" y="17" width="12" height="4" rx="1" fill="url(#g)"/>
  <!-- Book body -->
  <rect x="8" y="21" width="28" height="23" rx="2" fill="url(#g)"/>
  <!-- Spine -->
  <line x1="22" y1="21" x2="22" y2="44" stroke="white" stroke-width="0.8" opacity="0.2"/>
  <!-- Top edge highlight -->
  <line x1="8" y1="21" x2="36" y2="21" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <!-- F — vertical stroke -->
  <rect x="11" y="24" width="3.5" height="16" rx="1.5" fill="white"/>
  <!-- F — top bar -->
  <rect x="11" y="24" width="9" height="3" rx="1.5" fill="white"/>
  <!-- F — middle bar -->
  <rect x="11" y="32" width="6" height="3" rx="1.5" fill="white"/>
  <!-- Right page ruled lines -->
  <line x1="24" y1="28" x2="34" y2="28" stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.25"/>
  <line x1="24" y1="33" x2="34" y2="33" stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.25"/>
  <line x1="24" y1="38" x2="34" y2="38" stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.25"/>
  <!-- Wordmark -->
  <text x="52" y="33"
    font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="600" letter-spacing="-1"
    fill="#F8FAFC">Futurely</text>
</svg>
